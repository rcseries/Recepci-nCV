<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Reclutamiento</title>
    <link rel="stylesheet" href="../src/css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <span class="logo-icon">📋</span>
            </div>
            <h1>Sistema de Reclutamiento</h1>
            <p class="subtitle">Ingresa con tus credenciales</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="usuario">👤 Usuario</label>
                    <input type="text" id="usuario" placeholder="recepcioncv" value="recepcioncv" required>
                </div>
                
                <div class="form-group">
                    <label for="password">🔒 Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" value="recepcioncv" required>
                </div>
                
                <button type="submit" id="loginButton">✅ Ingresar</button>
                
                <div id="mensajeError" class="error-message" style="display: none;">
                    ❌ Usuario o contraseña incorrectos
                </div>
            </form>
            
            <p class="footer-text">Sistema de Recepción de CVs v1.0</p>
        </div>
    </div>
    
    <!-- Importar módulos JavaScript -->
    <script type="module" src="../src/js/pages/login.js"></script>
</body>
</html>
