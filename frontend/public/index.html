<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Reclutamiento</title>
    <link rel="stylesheet" href="../src/css/styles.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>📋 Dashboard - Sistema de Reclutamiento</h1>
            <div class="user-info">
                <span>👤 <span id="usuarioDisplay">recepcioncv</span></span>
                <button id="logoutButton" class="btn-logout">🚪 Cerrar Sesión</button>
            </div>
        </div>
        
        <div class="dashboard-content">
            <div class="welcome-card">
                <h2>¡Bienvenido al Sistema de Reclutamiento!</h2>
                <p>Aquí podrás gestionar empresas, procesos de selección y candidatos.</p>
                <p>🔧 <strong>Próximos pasos:</strong> Implementar CRUD de empresas, procesos y candidatos.</p>
            </div>
            
            <div class="quick-stats">
                <div class="stat-card">
                    <h3>🏢 Empresas</h3>
                    <p class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <h3>📋 Procesos</h3>
                    <p class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <h3>👥 Candidatos</h3>
                    <p class="stat-number">0</p>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="../src/js/app.js"></script>
</body>
</html>
